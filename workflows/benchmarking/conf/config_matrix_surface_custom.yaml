# Matrix surface benchmark: every ``benchmark.models`` entry × every ``benchmark.datasets`` entry.
# Incompatible model/domain pairs are skipped automatically (see engine ``allow_skip_mismatch``).
#
# Run:
#   python main.py --config-name=config_matrix_surface_custom
#
# When ``checkpoint`` and ``stats_path`` are both set, they override built-in ``hf://`` defaults
# (per-model roots in ``builtin_packages``: ``GEOTRANSOLVER_PACKAGE_ROOT``, etc.). Omit those keys to download from Hub instead.
# DoMINO: omit ``checkpoint`` / ``stats_path`` / ``domino_config`` to pull weights + ``config.yaml`` from Hub
# (see ``builtin_packages``); set any of them to override.
# Uncomment or add more models (registered names: ``*_surface`` / ``*_volume`` for GeoTransolver /
# Transolver / DoMINO; ``xmgn``, ``fignet``, …).

defaults:
  - _self_

hydra:
  run:
    dir: ${run.output_dir}
  output_subdir: hydra
  job:
    chdir: false

# null = use each dataset's ``case_ids`` below (or CLI ``case_id=run_1`` / list override).
# case_id: null
case_id: null

run:
  device: "cuda:0"
  output_dir: "benchmark_results_matrix_surface"
  seed: 42
  batch_size: 1
  save_inference_mesh: false
  metrics_cache:
    enabled: true
    path: ${run.output_dir}/metrics_cache

benchmark:
  mode: matrix
  models:
    - name: geotransolver_surface
      inference_domain: surface
      checkpoint: "/path/to/geotransolver_drivaerml_surface_checkpoint/checkpoint.0.501.pt"
      stats_path: "/path/to/geotransolver_drivaerml_surface_checkpoint/global_stats.json"
      kwargs: { batch_resolution: 60000, geometry_sampling: 300000 }
    - name: transolver_surface
      inference_domain: surface
      checkpoint: "/path/to/transolver_drivaerml_surface_checkpoint/checkpoint.0.501.pt"
      stats_path: "/path/to/transolver_drivaerml_surface_checkpoint/global_stats.json"
      kwargs: { batch_resolution: 60000, geometry_sampling: 300000 }
    - name: xmgn_surface
      inference_domain: surface
      checkpoint: "/path/to/xmgn_drivaerml_surface_checkpoint/final_model_checkpoint.pth"
      stats_path: "/path/to/xmgn_drivaerml_surface_checkpoint/global_stats.json"
      # If boundary VTP omits Normals, see xmgn wrapper doc: surface_auto_orient_normals / surface_flip_normals
      kwargs: { "max_points": 250000, "interpolation_k": 4 }
    - name: fignet_surface
      inference_domain: surface
      checkpoint: "/path/to/fignet_drivaerml_surface_checkpoint/model_00999.pth"
      stats_path: "/path/to/fignet_drivaerml_surface_checkpoint/global_stats.json"
      kwargs: { "max_points": 250000, "interpolation_k": 4 }
    - name: domino_surface
      inference_domain: surface
      checkpoint: "/path/to/domino_drivaerml_surface_checkpoint/checkpoint.0.501.pt"
      # DoMINO uses ``scaling_factors.pkl`` (not ``global_stats.json`` like GeoTransolver / Transolver).
      stats_path: "/path/to/domino_drivaerml_surface_checkpoint/scaling_factors.pkl"
      kwargs: { "domino_config": "/path/to/domino_drivaerml_surface_checkpoint/config.yaml" }
    # Uncomment when you have a your custom model surface checkpoint + stats next to it (same layout as training).
    # - name: surface_baseline_model
    #   inference_domain: surface
    #   checkpoint: "/path/to/surface_baseline_model/checkpoint.0.501.pt"
    #   stats_path: "/path/to/surface_baseline_model/global_stats.json"
    #   kwargs: { }
  datasets:
    - name: drivaerml
      root: "/data/drivaerml"
      kwargs: { align_ground_truth_to_model: true, inference_domain: surface }
  # When true: writes full os.environ → env.json (may leak HF/AWS tokens). Prefer false for shared runs.
  reproducibility:
    log_env: false
    save_artifacts: false

output:
  # mesh_field_names / ground_truth_mesh_field_names: VTK array names used when writing optional .vtp outputs
  # (e.g. inference or comparison meshes); align with model outputs and GT field names from the dataset adapter.
  surface_interpolate_point_to_cell_for_metrics: true
  surface_metrics_idw_k: 5
  mesh_field_names:
    pressure: "pressure_pred"
    shear_stress: "wall_shear_stress_pred"
  ground_truth_mesh_field_names:
    pressure: "pressure_true"
    shear_stress: "wall_shear_stress_true"

metrics:
  - l2_pressure
  - l2_shear_stress
  - l2_pressure_area_weighted
  - drag
  - lift

reports:
  enabled: false
  save_comparison_meshes: false
  comparison_mesh_subdir: comparison_meshes
  visual_case_ids: [run_1, run_11]
  visuals: []
